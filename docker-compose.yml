services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: stockapp
      POSTGRES_PASSWORD: stockapp
      POSTGRES_DB: stockapp
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockapp -d stockapp"]
      interval: 5s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./apps/worker
    environment:
      PYTHONPATH: /app/src
    ports:
      - "8000:8000"

  web:
    build:
      context: ./apps/web
    environment:
      DATABASE_URL: postgresql://stockapp:stockapp@postgres:5432/stockapp
      ANALYSIS_WORKER_URL: http://worker:8000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      worker:
        condition: service_started
